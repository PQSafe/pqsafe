# PQSafe API Reference — Fly.io deployment config
# Deploy with: fly deploy --app pqsafe-api
#
# Required secrets (set once):
#   fly secrets set AIRWALLEX_CLIENT_ID=xxx AIRWALLEX_API_KEY=xxx PQSAFE_API_KEY=xxx
#
# Custom domain:
#   fly certs add api.pqsafe.xyz

app = "pqsafe-api"
primary_region = "sin"  # Singapore — closest to HK / APAC

[build]
  dockerfile = "Dockerfile"

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  LOG_LEVEL = "info"
  AIRWALLEX_MODE = "sandbox"
  PQSAFE_MOCK_MODE = "false"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
    tls_options = { alpn = ["h2", "http/1.1"] }

  [services.concurrency]
    hard_limit = 50
    soft_limit = 25
    type = "connections"

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
