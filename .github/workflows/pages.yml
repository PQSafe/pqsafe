name: Deploy landing → Cloudflare Pages
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
concurrency:
  group: pages-cf
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing --project-name=pqsafe-landing --branch=main --commit-dirty=true
