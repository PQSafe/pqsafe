name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: agent-pay
        run: npm install
      - name: Type check
        working-directory: agent-pay
        run: npm run typecheck
      - name: Run tests
        working-directory: agent-pay
        run: npm test
      - name: Run canonicalization tests
        working-directory: agent-pay
        run: npm run test:canonical
