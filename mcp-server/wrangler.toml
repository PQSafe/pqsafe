# PQSafe MCP Server — Cloudflare Worker
# Deploy: npx wrangler deploy
# Custom domain: mcp.pqsafe.xyz/mcp

name = "pqsafe-mcp"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
PQSAFE_API_URL = "https://api.pqsafe.xyz"

# Secrets (set via CLI — do NOT put real values here):
#   npx wrangler secret put PQSAFE_API_KEY
#
# PQSAFE_API_KEY — bearer token matching the Fly.io API deployment

# Custom domain routing
[[routes]]
pattern = "mcp.pqsafe.xyz/*"
zone_name = "pqsafe.xyz"

[build]
command = "npm run build"
