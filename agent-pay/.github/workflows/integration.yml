name: Integration Tests (Nightly)

on:
  schedule:
    # 0 18 * * * = 18:00 UTC = 02:00 HKT (UTC+8)
    - cron: '0 18 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (all / airwallex / wise / cross-sdk / mcp)'
        required: false
        default: 'all'

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Run integration tests
        id: run_tests
        run: npm run test:integration
        env:
          # Sandbox credentials — set as GitHub Actions encrypted secrets
          AWX_SANDBOX_KEY: ${{ secrets.AWX_SANDBOX_KEY }}
          AWX_CLIENT_ID: ${{ secrets.AWX_CLIENT_ID }}
          AWX_SANDBOX_IBAN: ${{ secrets.AWX_SANDBOX_IBAN }}
          WISE_SANDBOX_KEY: ${{ secrets.WISE_SANDBOX_KEY }}
          WISE_SANDBOX_IBAN: ${{ secrets.WISE_SANDBOX_IBAN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PQSAFE_MOCK_MODE: '0'

      - name: Write Job Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "**Status:** ✅ All integration tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ Some integration tests failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the test output above for details." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "- AWX_SANDBOX_KEY: ${{ secrets.AWX_SANDBOX_KEY != '' && 'set' || 'NOT SET (tests skipped)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- WISE_SANDBOX_KEY: ${{ secrets.WISE_SANDBOX_KEY != '' && 'set' || 'NOT SET (tests skipped)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && 'set' || 'NOT SET (tests skipped)' }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Nightly integration tests failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## Integration Test Failure\n\nThe nightly integration tests failed.\n\n**Run:** ${runUrl}\n**Date:** ${new Date().toISOString()}\n\nPlease investigate and fix before the next nightly run.`,
              labels: ['ci-failure', 'integration-tests'],
            })
